<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <h2>Skipr</h2>
        <div class="toggle master">
            <span>Enable Skipr</span>
            <input type="checkbox" id="enabled" checked>
          </div>
          
          <hr>
        <div class="toggle">
            <span>Skip Intro</span>
            <input type="checkbox" id="skipIntro" checked>
        </div>
        <div class="toggle">
            <span>Next Episode</span>
            <input type="checkbox" id="nextEpisode" checked>
        </div>

        <p id="status">Active</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
